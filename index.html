<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>TypGame – Typing Shooter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Startscherm ─────────────────────────────────────── -->
  <div id="start-screen" class="screen">
    <div class="screen-content">
      <h1 class="game-title">TYP<span>GAME</span></h1>
      <p class="subtitle">Typ de woorden om vijanden te vernietigen</p>

      <button id="start-btn" class="btn">START GAME</button>

      <ul class="instructions">
        <li>Typ de <em>eerste letter</em> van een woord om te locken</li>
        <li>Typ het <em>volledige woord</em> om de vijand te vernietigen</li>
        <li>Vijanden die de bodem bereiken kosten een <em>leven</em></li>
      </ul>
    </div>
  </div>

  <!-- ── Game-over scherm ────────────────────────────────── -->
  <div id="gameover-screen" class="screen hidden">
    <div class="screen-content">
      <h1 class="game-title">GAME <span>OVER</span></h1>
      <p class="score-line">Score &nbsp;<span id="final-score">0</span></p>
      <p class="hs-line">High score &nbsp;<span id="high-score-display">0</span></p>
      <button id="restart-btn" class="btn">OPNIEUW SPELEN</button>
    </div>
  </div>

  <!-- ── HUD ────────────────────────────────────────────── -->
  <div id="hud" class="hidden" aria-live="polite">
    <div id="score-display">Score&thinsp;<span id="score">0</span></div>

    <div id="lives-display" aria-label="levens">
      <span class="life" aria-label="leven 1">&#9829;</span>
      <span class="life" aria-label="leven 2">&#9829;</span>
      <span class="life" aria-label="leven 3">&#9829;</span>
    </div>

    <div id="level-display">Level&thinsp;<span id="level">1</span></div>
  </div>

  <!-- ── Canvas ─────────────────────────────────────────── -->
  <canvas id="game-canvas" role="img" aria-label="Spelveld"></canvas>

  <!-- ── Mobiel toetsenbord ─────────────────────────────── -->
  <div id="mobile-keyboard" class="hidden" aria-label="Mobiel toetsenbord" role="toolbar">
    <!-- Gegenereerd door MobileKeyboard in script.js -->
  </div>

  <!-- Scripts ──────────────────────────────────────────── -->
  <script src="data/words.js"></script>
  <script src="script.js"></script>

</body>
</html>
